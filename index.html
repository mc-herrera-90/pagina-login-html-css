<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
  <title>Login</title>
</head>

<body>
  <header>
    <img src="assets/images/logo.png" alt="logo de la compañia">
  </header>
  <main>
    <form action="#" onsubmit="return false;">
      <h2>Login</h2>
      <div class="input-box">
        <label for="correo">Email:</label>
        <input type="email" name="correo" id="correo" placeholder="Ingresa tu correo">
      </div>
      <div class="input-box">
        <label for="contrasenia">Contraseña</label>
        <input type="password" name="contrasenia" id="contrasenia" placeholder="Ingresa tu contraseña">
      </div>
      <div class="submit-box">
        <button type="submit">Ingresar</button>
      </div>
      <div class="links-box">
        <a href="#">¿Olvidaste tu contraseña?</a>
        <div class="line">|</div>
        <a href="#">Registrarse</a>
      </div>
    </form>

  </main>
</body>

</html>
