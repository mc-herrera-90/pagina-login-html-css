<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
  <title>Registro</title>
</head>

<body class="registro">
  <header>
    <img src="assets/images/logo.png" alt="logo de la compañia">
  </header>
  <main>
    <form action="#" onsubmit="return false;">
      <h2>Registro</h2>
      <div class="input-box">
        <label for="correo">Nombre:</label>
        <input type="name" name="correo" id="correo" placeholder="Ingresa tu nombre">
      </div>
      <div class="input-box">
        <label for="nacimiento">Fecha de nacimiento</label>
        <input
          type="text"
          id="nacimiento"
          name="nacimiento"
          placeholder="DD/MM/AAAA"
          onfocus="this.type='date'"
          onblur="if(!this.value)this.type='text'"
        >
      </div>

      <div class="input-box">
        <label for="correo">Email:</label>
        <input type="email" name="correo" id="correo" placeholder="Ej: jperez@correo.cl" required>
      </div>

      <div class="input-box">
        <label for="contrasenia">Contraseña</label>
        <input type="password" name="contrasenia" id="contrasenia" placeholder="Ingresa tu contraseña" required>
      </div>
    
      <div class="input-box">
        <label for="deporte">¿Practicas algún deporte?</label>
      
        <select name="deporte" id="deporte">
          <option value="" disabled selected>
            Selecciona un deporte
          </option>
      
          <option value="futbol">Fútbol</option>
          <option value="basketball">Basketball</option>
          <option value="tenis">Tenis</option>
          <option value="running">Running</option>
          <option value="natacion">Natación</option>
          <option value="ciclismo">Ciclismo</option>
          <option value="gym">Gimnasio</option>
          <option value="voleibol">Voleibol</option>
          <option value="padel">Pádel</option>
          <option value="ninguno">Ninguno</option>
        </select>
      </div>

      <div class="input-box">
        <label for="actividad">¿Qué tipo de actividad le interesa?</label>
        <input type="name" name="actividad" id="correo" placeholder="Por ejemplo: competir">
      </div>

      <div class="submit-box">
        <button type="submit">Crear cuenta</button>
      </div>
      <div class="links-box">
        <span>¿Ya tienes una cuenta? <a href="index.html">Iniciar sesión</a></span>
      </div>
    </form>

  </main>
</body>

</html>
